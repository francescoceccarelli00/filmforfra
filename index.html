<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Film 4 Fra">
  <meta property="og:description" content="Scegli film o serie, apri il catalogo TMDB e guarda subito ciò che vuoi!">
  <meta property="og:image" content="https://static.vecteezy.com/system/resources/previews/011/508/381/original/movie-film-banner-design-template-cinema-background-concept-cinema-concept-with-popcorn-filmstrip-and-film-clapper-on-yellow-background-illustration-free-vector.jpg">
  <title>Film 4 Fra</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="film-strip"></div>

  <header>
    <p class="logo-eyebrow">Streaming privato</p>
    <h1>Film<span>4Fra</span></h1>
    <div class="logo-rule"><div class="logo-rule-dot"></div></div>
  </header>

  <main class="layout-shell">
    <div class="card">
      <div class="tabs" role="tablist" aria-label="Selezione tipo contenuto">
        <button id="tab-film" class="tab-btn active" data-tab="film" type="button" role="tab" aria-selected="true" aria-controls="panel-film">&#9632; Film</button>
        <button id="tab-serie" class="tab-btn" data-tab="serie" type="button" role="tab" aria-selected="false" aria-controls="panel-serie">&#9632; Serie</button>
      </div>

      <section id="panel-film" class="panel active" role="tabpanel" aria-labelledby="tab-film">
        <div class="panel-actions">
          <a class="choose-link" href="https://www.themoviedb.org/movie?language=it-IT" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M6 1h5v5M11 1L6 6M2 3H1v8h8V9"/></svg>
            Sfoglia film
          </a>
          <button class="catalog-btn" type="button" data-open-catalog="movie">
            Apri catalogo
          </button>
        </div>

        <div class="field">
          <label for="film-code">Codice TMDB</label>
          <input type="text" id="film-code" placeholder="es. 550" inputmode="numeric" autocomplete="off">
        </div>

        <button class="watch-btn" id="watch-film" type="button">
          <span>&#9654; Guarda ora</span>
        </button>
      </section>

      <section id="panel-serie" class="panel" role="tabpanel" aria-labelledby="tab-serie" hidden>
        <div class="panel-actions">
          <a class="choose-link" href="https://www.themoviedb.org/tv?language=it-IT" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 12 12" aria-hidden="true"><path d="M6 1h5v5M11 1L6 6M2 3H1v8h8V9"/></svg>
            Sfoglia serie
          </a>
          <button class="catalog-btn" type="button" data-open-catalog="tv">
            Apri catalogo
          </button>
        </div>

        <div class="field">
          <label for="serie-code">Codice serie TMDB</label>
          <input type="text" id="serie-code" placeholder="es. 1399" inputmode="numeric" autocomplete="off">
        </div>

        <div class="episode-row">
          <div class="field">
            <label for="season">Stagione</label>
            <input type="number" id="season" value="1" min="1">
          </div>
          <div class="field">
            <label for="episode">Episodio</label>
            <input type="number" id="episode" value="1" min="1">
          </div>
        </div>

        <button class="watch-btn" id="watch-serie" type="button">
          <span>&#9654; Guarda ora</span>
        </button>

        <div class="nav-row">
          <button id="back-arrow" class="arrow-btn" type="button" disabled>&#8592; Prec.</button>
          <button id="forward-arrow" class="arrow-btn" type="button">Succ. &#8594;</button>
        </div>
      </section>
    </div>

    <section id="video-container" aria-live="polite">
      <div class="video-label">In riproduzione</div>
      <div id="video-wrapper" tabindex="-1">
        <iframe
          id="video-frame"
          allowfullscreen
          allow="autoplay; fullscreen"
          referrerpolicy="strict-origin-when-cross-origin"
          title="Player video"
        ></iframe>
      </div>
    </section>
  </main>

  <aside id="catalog-shell" class="catalog-shell" aria-hidden="true">
    <button id="catalog-backdrop" class="catalog-backdrop" type="button" aria-label="Chiudi catalogo"></button>

    <section class="catalog-panel" role="dialog" aria-modal="true" aria-labelledby="catalog-title">
      <div class="catalog-header">
        <div>
          <p class="catalog-kicker">Catalogo integrato</p>
          <h2 id="catalog-title">Apri catalogo</h2>
          <p id="catalog-subtitle" class="catalog-subtitle">Ricerca, filtra e seleziona rapidamente da TMDB.</p>
        </div>
        <button id="catalog-close" class="catalog-close" type="button" aria-label="Chiudi catalogo">&times;</button>
      </div>

      <div class="catalog-filters">
        <div class="filter-field filter-field-wide">
          <label for="catalog-query">Titolo</label>
          <input id="catalog-query" type="text" placeholder="Es. Interstellar" autocomplete="off">
        </div>

        <div class="filter-field">
          <label for="catalog-type">Tipo</label>
          <select id="catalog-type">
            <option value="movie">Film</option>
            <option value="tv">Serie</option>
          </select>
        </div>

        <div class="filter-field">
          <label for="catalog-genre">Genere</label>
          <select id="catalog-genre">
            <option value="">Tutti</option>
          </select>
        </div>

        <div class="filter-field">
          <label for="catalog-year">Anno</label>
          <input id="catalog-year" type="number" min="1900" max="2099" placeholder="Es. 2024">
        </div>

        <div class="filter-field">
          <label for="catalog-sort">Ordina per</label>
          <select id="catalog-sort">
            <option value="popularity.desc">Popolarità ↓</option>
            <option value="primary_release_date.desc">Data ↓</option>
            <option value="primary_release_date.asc">Data ↑</option>
            <option value="vote_average.desc">Voto ↓</option>
            <option value="vote_average.asc">Voto ↑</option>
            <option value="title.asc">Titolo A-Z</option>
            <option value="title.desc">Titolo Z-A</option>
          </select>
        </div>

        <div class="filter-field" style="display: none;">
          <label for="catalog-rating">Voto minimo</label>
          <select id="catalog-rating">
            <option value="0">Qualsiasi</option>
            <option value="5">5+</option>
            <option value="6">6+</option>
            <option value="7">7+</option>
            <option value="8">8+</option>
          </select>
        </div>
      </div>

      <div class="catalog-toolbar">
        <div class="catalog-actions-inline">
          <button id="catalog-apply" class="catalog-action-btn" type="button">Applica filtri</button>
          <button id="catalog-reset" class="catalog-action-btn ghost" type="button">Reset</button>
        </div>
        <div class="catalog-meta">
          <span id="catalog-page-info">Pagina 1</span>
        </div>
        <div class="catalog-pagination">
          <button id="catalog-prev" class="arrow-btn" type="button">&#8592; Pagina prec.</button>
          <button id="catalog-next" class="arrow-btn" type="button">Pagina succ. &#8594;</button>
        </div>
      </div>

      <div id="catalog-feedback" class="catalog-feedback" aria-live="polite"></div>

      <div class="catalog-grid-shell">
        <div id="catalog-grid" class="catalog-grid"></div>
      </div>

      
    </section>
  </aside>

  <div id="toast" class="toast" aria-live="polite"></div>

  <footer>&copy; Film4Fra &mdash; Solo per uso personale</footer>

  <script src="./app.js"></script>
</body>
</html>
